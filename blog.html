<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-cream: #f1ede1;
            --text-dark: #000;
            --accent-lime: #c7ebae;
        }
        body {
            margin: 0;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .blog-hero {
            padding: 180px 5% 100px;
            text-align: center;
        }
        .blog-header-label {
            display: inline-block;
            background-color: var(--accent-lime);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .blog-header-title {
            font-family: 'Fraunces', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 1;
            margin-bottom: 30px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .blog-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 40px;
        }
        .blog-empty {
            text-align: center;
            padding: 150px 5%;
            font-size: 1.5rem;
            opacity: 0.5;
            font-family: 'Syne', sans-serif;
        }
        .nav-back {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 1000;
            background-color: var(--text-dark);
            color: #fff;
            padding: 12px 24px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
        }
        .nav-back:hover {
            transform: scale(1.05);
        }

    </style>
</head>
<body>
    <a href="index.html" class="nav-back">
        <span>←</span> Portfolio
    </a>

    <header class="blog-hero">
        <span class="blog-header-label">Digital Journal</span>

                    <a href="mailto:vcibirajan@gmail.com" class="social-circle" title="Email">📧</a>
                    <a href="https://twitter.com/_cibirajan" target="_blank" class="social-circle" title="Twitter">𝕏</a>
                    <a href="https://linkedin.com/in/cibirajan-visvanathan-14b35224a/" target="_blank" class="social-circle" title="LinkedIn">in</a>
                    <a href="https://github.com/CIBIRAJAN" target="_blank" class="social-circle" title="GitHub">🐙</a>
                    <a href="https://linkedin.com/in/cibirajan-visvanathan-14b35224a/" target="_blank" class="social-circle" title="Connect">+</a>
                </div>
