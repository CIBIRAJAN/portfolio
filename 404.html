<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Cibirajan Visvanathan</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css">
    
    <!-- Component Scripts -->
    <script src="/components/nav.js" defer></script>
    <script src="/components/footer.js" defer></script>
    
    <style>
        .page-404-active {
            background-color: var(--bg-cream);
            color: var(--text-primary);
            padding-top: 100px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .not-found-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
            max-width: var(--container-max);
            margin: 0 auto;
        }

        .code-404 {
            font-family: var(--font-display);
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.05em;
            color: var(--accent-lime);
            margin-bottom: 24px;
            position: relative;
        }
        
        .code-404::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            color: transparent;
            -webkit-text-stroke: 2px var(--text-primary);
            z-index: -1;
            transform: translate(15px, 15px);
            opacity: 0.15;
        }

        .title-404 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
        }

        .desc-404 {
            font-family: var(--font-body);
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
    </style>
</head>
<body class="page-404-active">
    <global-nav></global-nav>

    <main class="not-found-hero">
        <div class="code-404">404</div>
        <h1 class="title-404">Lost in the Void</h1>
        <p class="desc-404">The structural endpoint you are looking for has been moved, removed, or never existed in this ecosystem.</p>
        <a href="/" class="nav-btn-pill active" style="padding: 18px 40px; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 8px;">
            <span>BACK TO REALITY</span>
        </a>
    </main>

    <global-footer></global-footer>
    <script src="scripts/main.js" defer></script>
</body>
</html>
