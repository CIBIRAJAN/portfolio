<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portfolio CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@600;900&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1ede1;
            --accent: #c7ebae;
            --dark: #0b1e1b;
            --text: #0b1e1b;
            --surface: #ffffff;
            --border: rgba(11, 30, 27, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 40px 100px rgba(11, 30, 27, 0.05);
            border: 1px solid var(--border);
            text-align: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 40px;
            display: block;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            margin-bottom: 30px;
        }
        .form-group { text-align: left; margin-bottom: 24px; }
        label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 0.85rem; }
        input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #f8f8f8;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--dark);
            background: #fff;
        }
        .btn-login {
            background: var(--dark);
            color: var(--accent);
            width: 100%;
            padding: 20px;
            border-radius: 100px;
            border: none;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        #error-msg {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Portfolio CMS</div>
        <h1>Welcome Back</h1>
        <form id="login-form">
            <div class="form-group">
                <label>USER ID</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Unlock Dashboard</button>
            <div id="error-msg">❌ Invalid credentials. Please try again.</div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (email === 'vcibirajan@gmail.com' && password === 'cibi2710') {
                // Success: store a very simple session token
                localStorage.setItem('cms_auth', 'true');
                localStorage.setItem('cms_user', email);
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        });

        // Clear previous sessions on load
        if(window.location.search === '?logout') {
            localStorage.removeItem('cms_auth');
        }
    </script>
</body>
</html>
