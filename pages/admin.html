<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&family=Outfit:wght@600;900&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f1ede1; /* Portfolio Cream */
            --surface: #ffffff;
            --surface-hover: #f9f7f0;
            --accent: #c7ebae; /* Portfolio Lime */
            --dark: #0b1e1b;   /* Portfolio Black */
            --text: #0b1e1b;
            --text-muted: #666;
            --border: rgba(11, 30, 27, 0.08);
            --radius: 20px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            color: #fff;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            margin-bottom: 60px;
            color: var(--accent);
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        .nav-items { display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            padding: 16px 20px;
            border-radius: 14px;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .nav-item.active {
            background: var(--accent);
            color: var(--dark);
        }

        /* Main Content */
        .main {
            margin-left: 280px;
            flex: 1;
            padding: 80px 5%;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }
        .btn-add {
            background: var(--dark);
            color: var(--accent);
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Grid & Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }
        .admin-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .admin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(11, 30, 27, 0.05);
            border-color: var(--accent);
        }
        .card-image-preview {
            width: 100%;
            height: 180px;
            background: #f8f8f8;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .card-image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-body { flex-grow: 1; display: flex; flex-direction: column; }
        .admin-card h3 {
            margin: 0 0 8px 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--dark);
        }
        .card-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 20px 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            transition: 0.2s;
        }
        .btn-edit { background: var(--surface-hover); color: var(--dark); }
        .btn-edit:hover { background: var(--accent); border-color: var(--accent); }
        .btn-delete { color: #ff4444; border-color: rgba(255,68,68,0.1); }
        .btn-delete:hover { background: #fff5f5; border-color: #ff4444; }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(11, 30, 27, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 650px;
            border-radius: 30px;
            padding: 50px;
            max-height: 94vh;
            overflow-y: auto;
            position: relative;
        }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; font-weight: 700; color: var(--dark); }
        input, textarea, select {
            width: 100%;
            background: #f8f8f8;
            border: 1px solid var(--border);
            color: var(--dark);
            padding: 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--dark);
            background: #fff;
        }
        .image-preview-container {
            margin-top: 10px;
            position: relative;
        }
        .image-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: none;
        }
        .file-upload-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
        }
        .btn-save {
            background: var(--dark);
            color: #fff;
            padding: 14px 30px;
            border-radius: 100px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            min-width: 150px;
        }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Loading Overlay */
        #loader {
            display: none;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Portfolio CMS</div>
        <div id="nav-list" class="nav-items">
            <div id="nav-projects" class="nav-item active" onclick="switchTable('projects')">Projects</div>
            <div id="nav-customers" class="nav-item" onclick="switchTable('customers')">Customers</div>
            <div id="nav-blog_posts" class="nav-item" onclick="switchTable('blog_posts')">Blog Posts</div>
            <div id="nav-footer_links" class="nav-item" onclick="switchTable('footer_links')">Footer Links</div>
            <div id="nav-section_images" class="nav-item" onclick="switchTable('section_images')">Section Images</div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: #ff6b6b; border: 1px solid rgba(255,107,107,0.2);">Logout</div>
        </div>
    </div>

    <div class="main">
        <header>
            <h1 id="table-title">Projects</h1>
            <button class="btn-add" onclick="openModal()">+ Add New</button>
        </header>

        <div id="content-grid" class="card-grid">
            <!-- Dynamic Content -->
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="font-family: Fraunces, serif; margin-bottom: 30px;">Add New Record</h2>
            <form id="cms-form">
                <!-- Fields Injected Here -->
            </form>
            <div id="loader">Processing... please wait.</div>
            <div class="modal-footer">
                <button class="btn-action" onclick="closeModal()" style="border-radius: 100px;">Cancel</button>
                <button class="btn-save" id="save-btn" onclick="saveData()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kfcqfaqkxbsvjatzjxfd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmY3FmYXFreGJzdmphdHpqeGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDg4ODksImV4cCI6MjA4OTMyNDg4OX0.ReAzLZ_uxSeXoNIIA0oTSnjdvNjP48HxpMA_X6BpXbs';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTable = 'projects';
        let currentData = [];
        let editingId = null;

        const tableConfigs = {
            projects: {
                title: 'Projects',
                storagePath: 'projects',
                fields: [
                    { name: 'title', label: 'Title', type: 'text' },
                    { name: 'category', label: 'Category', type: 'text' },
                    { name: 'description', label: 'Description', type: 'textarea' },
                    { name: 'image', label: 'Project Dashboard Image', type: 'image' },
                    { name: 'link', label: 'Project Link', type: 'text' },
                    { name: 'tech', label: 'Tech Stack (comma separated)', type: 'text' },
                    { name: 'case_study_label', label: 'CTA Label', type: 'text' }
                ]
            },
            customers: {
                title: 'Customers',
                storagePath: 'avatars',
                fields: [
                    { name: 'name', label: 'Name', type: 'text' },
                    { name: 'role', label: 'Role', type: 'text' },
                    { name: 'review', label: 'Review', type: 'textarea' },
                    { name: 'avatar', label: 'Customer Avatar', type: 'image' },
                    { name: 'rating', label: 'Rating (1-5)', type: 'number' },
                    { name: 'bg_class', label: 'BG Style (bg-lime, bg-dark, bg-cream)', type: 'text' },
                    { name: 'tilt_class', label: 'Tilt (tilt-left, tilt-right)', type: 'text' }
                ]
            },
            blog_posts: {
                title: 'Blog Posts',
                storagePath: 'blog',
                fields: [
                    { name: 'title', label: 'Title', type: 'text' },
                    { name: 'excerpt', label: 'Excerpt', type: 'textarea' },
                    { name: 'image', label: 'Cover Image', type: 'image' },
                    { name: 'link', label: 'URL', type: 'text' }
                ]
            },
            footer_links: {
                title: 'Footer Links',
                storagePath: 'icons',
                fields: [
                    { name: 'title', label: 'Title', type: 'text' },
                    { name: 'url', label: 'URL', type: 'text' },
                    { name: 'icon', label: 'Icon (Emoji or Upload Image)', type: 'text' },
                    { name: 'type', label: 'Type', type: 'select', options: ['nav', 'social'] }
                ]
            },
            section_images: {
                title: 'Section Images',
                storagePath: 'hero',
                fields: [
                    { name: 'section_name', label: 'Section ID', type: 'text' },
                    { name: 'image_url', label: 'Section Visual', type: 'image' }
                ]
            }
        };

        async function switchTable(table) {
            currentTable = table;
            document.getElementById('table-title').innerText = tableConfigs[table].title;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${table}`).classList.add('active');
            fetchData();
        }

        async function fetchData() {
            const { data, error } = await supabaseClient.from(currentTable).select('*').order('created_at', { ascending: false });
            if (error) alert(error.message);
            currentData = data;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = currentData.map(item => {
                const img = item.image || item.avatar || item.image_url || null;
                const title = item.title || item.name || item.section_name || 'Untitled';
                const sub = item.description || item.review || item.excerpt || item.url || '';
                
                return `
                <div class="admin-card">
                    ${img ? `<div class="card-image-preview"><img src="${img}" alt="Preview" onerror="this.parentElement.style.display='none'"></div>` : ''}
                    <div class="card-body">
                        <h3>${title}</h3>
                        <p class="card-subtitle">${sub}</p>
                    </div>
                    <div class="card-actions">
                        <button class="btn-action btn-edit" onclick="editItem('${item.id}')">Edit</button>
                        <button class="btn-action btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
                    </div>
                </div>
            `}).join('');
        }

        function openModal(editingItem = null) {
            editingId = editingItem ? editingItem.id : null;
            document.getElementById('modal-title').innerText = editingId ? 'Update Record' : 'Add New Record';
            document.getElementById('modal').style.display = 'flex';
            
            const form = document.getElementById('cms-form');
            const config = tableConfigs[currentTable];
            
            form.innerHTML = config.fields.map(field => {
                let val = '';
                if(editingItem) {
                    val = editingItem[field.name];
                    if(field.name === 'tech' && Array.isArray(val)) val = val.join(', ');
                }
                
                if (field.type === 'image') {
                    return `
                        <div class="form-group">
                            <label>${field.label}</label>
                            <div class="file-upload-wrapper">
                                <input type="file" id="file-${field.name}" accept="image/*" onchange="previewImage(this, '${field.name}')">
                                <input type="hidden" id="field-${field.name}" value="${val || ''}">
                            </div>
                            <div class="image-preview-container">
                                <img id="preview-${field.name}" src="${val || ''}" class="image-preview" style="${val ? 'display:block;' : ''}">
                            </div>
                        </div>
                    `;
                }
                
                return `
                    <div class="form-group">
                        <label>${field.label}</label>
                        ${field.type === 'textarea' 
                            ? `<textarea id="field-${field.name}" rows="4">${val || ''}</textarea>` 
                            : field.type === 'select'
                                ? `<select id="field-${field.name}">${field.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}</select>`
                                : `<input type="${field.type}" id="field-${field.name}" value="${val || ''}">`
                        }
                    </div>
                `;
            }).join('');
        }

        function previewImage(input, fieldName) {
            const preview = document.getElementById(`preview-${fieldName}`);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function editItem(id) {
            const item = currentData.find(d => d.id === id);
            openModal(item);
        }

        async function uploadImage(field) {
            const fileInput = document.getElementById(`file-${field.name}`);
            if (!fileInput.files || fileInput.files.length === 0) return null;

            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            const filePath = `${tableConfigs[currentTable].storagePath}/${fileName}`;

            const { data, error } = await supabaseClient.storage
                .from('portfolio')
                .upload(filePath, file, { upsert: true });

            if (error) throw error;

            return `${SUPABASE_URL}/storage/v1/object/public/portfolio/${filePath}`;
        }

        async function saveData() {
            setLoading(true);
            const config = tableConfigs[currentTable];
            const payload = {};
            
            try {
                for (const field of config.fields) {
                    if (field.type === 'image') {
                        const newUrl = await uploadImage(field);
                        payload[field.name] = newUrl || document.getElementById(`field-${field.name}`).value;
                    } else {
                        let val = document.getElementById(`field-${field.name}`).value;
                        if(field.name === 'tech') val = val.split(',').map(t => t.trim());
                        if(field.name === 'rating') val = parseInt(val) || 5;
                        payload[field.name] = val;
                    }
                }

                let error;
                if(editingId) {
                    const { error: err } = await supabaseClient.from(currentTable).update(payload).eq('id', editingId);
                    error = err;
                } else {
                    const { error: err } = await supabaseClient.from(currentTable).insert([payload]);
                    error = err;
                }

                if (error) throw error;
                
                closeModal();
                fetchData();
            } catch (err) {
                alert(err.message);
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('save-btn');
            const loader = document.getElementById('loader');
            btn.disabled = isLoading;
            btn.innerText = isLoading ? 'Saving...' : 'Save Changes';
            loader.style.display = isLoading ? 'block' : 'none';
        }

        async function deleteItem(id) {
            if(!confirm('Are you sure?')) return;
            const { error } = await supabaseClient.from(currentTable).delete().eq('id', id);
            if (error) alert(error.message);
            else fetchData();
        }

        function setAuth() {
            const isAuth = localStorage.getItem('cms_auth') === 'true';
            if(!isAuth) {
                window.location.href = 'login.html';
            } else {
                fetchData();
            }
        }

        function logout() {
            localStorage.removeItem('cms_auth');
            window.location.href = 'login.html?logout';
        }

        setAuth();
    </script>
</body>
</html>
